<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Nix-C">
  <defs>
    <linearGradient id="nc-bg" x1="8" y1="4" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1028"/>
      <stop offset="1" stop-color="#0a0a10"/>
    </linearGradient>
    <linearGradient id="nc-stroke" x1="16" y1="14" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e9d5ff"/>
      <stop offset="0.45" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="nc-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Obsidian rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#nc-bg)" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
  <!-- Minimal N monogram — store / graph upward -->
  <path
    filter="url(#nc-glow)"
    d="M20 46V18h5.2l13.6 18.2V18H46v28h-5.2L27.2 27.8V46H20z"
    fill="url(#nc-stroke)"
  />
  <!-- Radiant accent dot -->
  <circle cx="46.5" cy="17.5" r="3.2" fill="#c084fc" opacity="0.95"/>
</svg>
