name: Error
about: Informa de un fallo reproducible
title: "bug: "
labels: [bug, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Qué ocurrió
      description: Incluye el resultado esperado y el real.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Pasos para reproducir
      placeholder: "1. Abrir...\n2. Pulsar...\n3. Observar..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Versión o commit
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Entorno
      options: [Navegador, Tauri Linux, Tauri Windows, Tauri macOS, Otro]
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidencia y logs
      description: Elimina datos personales, secretos y datos reales del negocio.
