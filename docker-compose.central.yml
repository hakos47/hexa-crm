services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: hexa_crm
      POSTGRES_USER: hexa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set outside the repository}
    # PostgreSQL 18 stores the cluster under a versioned subdirectory.
    volumes: [hexa_pgdata:/var/lib/postgresql]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexa -d hexa_crm"]
      interval: 5s
      timeout: 3s
      retries: 20
  api:
    build: .
    environment:
      DATABASE_URL: postgresql://hexa:${POSTGRES_PASSWORD}@db:5432/hexa_crm
      HOST: 0.0.0.0
      PORT: 3000
      HEXA_SERVICE_KEYS: ${HEXA_SERVICE_KEYS:-[]}
    depends_on:
      db: { condition: service_healthy }
    ports: ["${HEXA_API_PORT:-3001}:3000"]
volumes:
  hexa_pgdata:
